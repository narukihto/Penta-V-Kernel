# --- Cargo.toml additions ---

[profile.dev]
# Technical: Required for no_std builds to avoid unwinding overhead
panic = "abort"

[profile.release]
# Technical: Ensures deterministic termination on panic in production
panic = "abort"

[features]
# Critical: Defines the extension-module feature for Python support
extension-module = ["pyo3/extension-module"]

[dependencies]
# Python Bridge: PyO3 is optional and tied to the extension-module feature
pyo3 = { version = "0.21", features = ["extension-module"], optional = true }
