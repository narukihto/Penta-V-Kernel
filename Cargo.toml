[package]
name = "penta_v_kernel"
# Version 1.1.0: Implementation of Logic Validation and Legacy Telemetry.
version = "1.1.0"
edition = "2021"
authors = ["Khalid (The First Architect) <Issaclex@proton.me>"]
description = "A mission-critical Geometric Stability Protocol with AI Logic Validation and Sovereign Deployment."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/Penta-V-Kernel/Penta-V-Kernel"
homepage = "https://github.com/Penta-V-Kernel"

[lib]
name = "penta_v_kernel"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"] 

[features]
# The 'default' feature handles core pyo3 initialization for local testing.
default = ["pyo3"]

# 'extension-module' is mandatory for Python wheel builds (Maturin).
extension-module = ["pyo3/extension-module"]

# Sovereign pack optimized for Python 3.10+ ABI stability.
sovereign-pack = ["pyo3/abi3-py310"]

[dependencies]
# Standard PyO3 with auto-initialize for seamless Python integration.
pyo3 = { version = "0.21", features = ["auto-initialize"], optional = true }

# --- Penta-Clean & Core Dependencies ---
# Rayon handles parallel geometric dissipation tasks.
rayon = "1.8"

# Polars core for high-performance data sanitization.
polars-core = { version = "0.36", features = [
    "performant", 
    "rows",        
    "zip_with",    
    "fmt"          
] }

[build-dependencies]
# Essential for linking and PyO3 configuration.
pyo3-build-config = "0.21"

[profile.dev]
# Enforce abort on panic to maintain kernel state integrity.
panic = "abort"

[profile.release]
# Sovereign Deployment Optimizations.
panic = "abort"
lto = true             # Link-Time Optimization for maximum performance.
opt-level = 3          # Max optimization for speed.
strip = "symbols"      # Minimal binary footprint.
codegen-units = 1      # Enhance LTO effectiveness.

[profile.test]
panic = "abort"
