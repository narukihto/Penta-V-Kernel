[package]
name = "penta_v_kernel"
version = "0.3.0"
edition = "2021"
authors = ["Khalid (The First Architect) <Issaclex@proton.me>"]
description = "A mission-critical Geometric Stability Protocol with Integrated Data Cleaning and Sovereign Deployment."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com"
homepage = "https://github.com"

[lib]
name = "penta_v_kernel"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"] 

[features]
extension-module = ["pyo3/extension-module"]
sovereign-pack = ["pyo3/abi3-py310"]

[dependencies]
pyo3 = { version = "0.21", features = ["extension-module"], optional = true }

# --- Penta-Clean Engine Dependencies ---
rayon = "1.8"

# Polars configuration: 
# Replaced 'dtype-full' with specific necessary types to resolve CI conflict.
polars-core = { version = "0.36", features = [
    "performant", 
    "interpolate", 
    "dtype-float", # Essential for stability_score (f64)
    "dtype-u64",   # Essential for node_id
    "dtype-struct" 
] }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true
opt-level = 3
strip = "symbols"
codegen-units = 1

[profile.test]
panic = "abort"
