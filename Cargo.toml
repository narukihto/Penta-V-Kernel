[package]
name = "penta_v_kernel"
version = "0.3.0"
edition = "2021"
authors = ["narkuto(The First Architect) <Issaclex@proton.me>"]
description = "A mission-critical Geometric Stability Protocol with Integrated Data Cleaning and Sovereign Deployment."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com"
homepage = "https://github.com"

[lib]
name = "penta_v_kernel"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"] 

[features]
# The 'default' feature now only includes the core pyo3 functionality.
# This ensures 'cargo test' links against the local Python binary correctly.
default = ["pyo3"]

# 'extension-module' is now a standalone feature. 
# It MUST be passed explicitly during 'maturin build' or 'maturin develop'.
extension-module = ["pyo3/extension-module"]

# Sovereign pack for specific Python ABI compatibility.
sovereign-pack = ["pyo3/abi3-py310"]

[dependencies]
# Standard PyO3 dependency with auto-initialize. 
# 'extension-module' is removed from here to prevent linking errors during standalone tests.
pyo3 = { version = "0.21", features = ["auto-initialize"], optional = true }

# --- Penta-Clean Engine Dependencies ---
rayon = "1.8"

# Polars configuration for geometric data handling and stability.
polars-core = { version = "0.36", features = [
    "performant", 
    "rows",        
    "zip_with",    
    "fmt"          
] }

[build-dependencies]
# Essential helper for PyO3 build-time configuration.
pyo3-build-config = "0.21"

[profile.dev]
panic = "abort"

[profile.release]
# Optimized for sovereign deployment and minimal binary footprint.
panic = "abort"
lto = true
opt-level = 3
strip = "symbols"
codegen-units = 1

[profile.test]
panic = "abort"
