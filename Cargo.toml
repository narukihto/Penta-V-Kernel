[package]
name = "penta_v_kernel"
version = "0.3.0"
edition = "2021"
authors = ["narukoto (The First Architect) <Issaclex@proton.me>"]
description = "A mission-critical Geometric Stability Protocol with Integrated Data Cleaning and Sovereign Deployment."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com"
homepage = "https://github.com"

[lib]
name = "penta_v_kernel"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"] 

[features]
# Default feature set for development and testing
default = ["pyo3"]
# Required for building Python extension modules
extension-module = ["pyo3/extension-module"]
# Sovereign pack for specific Python ABI compatibility
sovereign-pack = ["pyo3/abi3-py310"]

[dependencies]
# PyO3 with auto-initialize to resolve undefined symbols during 'cargo test'
pyo3 = { version = "0.21", features = ["extension-module", "auto-initialize"], optional = true }

# --- Penta-Clean Engine Dependencies ---
rayon = "1.8"

# Polars configuration utilizing core features for geometric data handling
polars-core = { version = "0.36", features = [
    "performant", 
    "rows",        
    "zip_with",    
    "fmt"          
] }

[build-dependencies]
# Helper crate for PyO3 build configurations and linker arguments
pyo3-build-config = "0.21"

[profile.dev]
panic = "abort"

[profile.release]
# Aggressive optimization for sovereign production deployment
panic = "abort"
lto = true
opt-level = 3
strip = "symbols"
codegen-units = 1

[profile.test]
panic = "abort"
