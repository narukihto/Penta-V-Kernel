name: Penta-V Kernel CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  # Enable manual "Run workflow" button in GitHub Actions UI
  workflow_dispatch: 

jobs:
  test:
    name: Rust Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Stability & Benchmark Tests
        run: cargo test --verbose

  integrity_audit:
    name: Protocol Integrity Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run Integrity Audit
        run: echo "Verifying protocol integrity and SECURE_CORE boundary monitoring"

  publish:
    name: Production Release (Crates.io)
    runs-on: ubuntu-latest
    needs: [test, integrity_audit]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Authenticate & Publish Crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
