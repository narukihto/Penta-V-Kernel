name: Penta-V Kernel Sovereign Release

on:
  push:
    # Monitoring core architecture, heartbeat logic, and implementation branches
    branches: [ main, Heartbeat, ikom ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  test:
    name: Core, Stability & Performance Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Integrated Test Suite
        # Testing v0.4.0 logic (HRL + Validator) using local Python symbols
        run: cargo test --verbose --features default

      - name: Verify Sovereign Integration
        # Ensuring AI Logic Validation and Blockchain synergy
        run: cargo test --test integration_suite --features default

      - name: Execute Sovereign Benchmarks
        # Captures the sub-nanosecond performance (HRL Resonance Pass)
        # We use continue-on-error so benchmarks don't block the release if stats slightly deviate
        run: |
          cargo bench --bench resonance_bench -- --output-format bencher | tee benchmark_result.txt
        continue-on-error: true

      - name: Upload Performance Artifacts
        # Stores Criterion HTML reports (Violin plots/graphs) for documentation
        uses: actions/upload-artifact@v4
        with:
          name: resonance-performance-report
          path: target/criterion/

  build_wheels:
    name: Build Sovereign Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Global Compatibility Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Version 0.4.0 with HRL & Sovereign-pack features
          args: --release --out dist --features extension-module --features sovereign-pack
          sccache: 'true'
          manylinux: auto 

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish_pypi:
    name: Sovereign PyPI Deployment
    runs-on: ubuntu-latest
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    environment: release
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Deploy to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
