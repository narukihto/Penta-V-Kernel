name: Penta-V Kernel Sovereign Release

on:
  push:
    # Monitor core development, heartbeat sync, and ikom implementation branches
    branches: [ main, Heartbeat, ikom ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  # Manual Trigger: Enables the "Run workflow" button in the Actions tab
  workflow_dispatch: 

jobs:
  test:
    name: Core & Stability Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python for Linker Symbols
        # Required to provide Python headers for PyO3 auto-initialize during tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Integrated Test Suite
        # Enforcing full feature testing for Penta-Clean and Sovereign-Pack modules
        # This now utilizes the build.rs and auto-initialize feature to prevent linker errors
        run: cargo test --verbose --all-features

  build_wheels:
    name: Build Sovereign Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        # Cross-platform validation for global deployment
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Global Compatibility Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # --features extension-module: Standard PyO3 entry point
          # --features sovereign-pack: Activates ABI3 universal compatibility for Python 3.10+
          args: --release --out dist --features extension-module --features sovereign-pack
          sccache: 'true'
          manylinux: auto 

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish_pypi:
    name: Sovereign PyPI Deployment
    runs-on: ubuntu-latest
    needs: build_wheels
    # Deployment triggers on version tags or manual dispatch
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    environment: release
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Deploy to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
