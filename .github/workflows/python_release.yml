name: Penta-V Kernel PyPI Release

on:
  push:
    branches: [ main, pypi-branch ] # Target your specific pypi branch
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  test:
    name: Rust Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Stability & Benchmark Tests
        run: cargo test --verbose

  build_wheels:
    name: Build Python Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        # Build for all major operating systems
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build Wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          sccache: 'true'
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish_pypi:
    name: Production Release (PyPI)
    runs-on: ubuntu-latest
    needs: build_wheels
    # Critical: Only publish when a version tag (v*) is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          # Requirement: PYPI_API_TOKEN must be set in GitHub Secrets
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
